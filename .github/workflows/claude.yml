name: Claude Maintenance

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request:
    types: [opened]
  pull_request_review:
    types: [submitted]
  schedule:
    - cron: "0 9 * * 1" # every Monday 09:00 UTC

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # ── @claude mention in comments / issues ──────────────────────────────────
  claude-mention:
    name: Claude (@claude mention)
    if: |
      (github.event_name == 'issue_comment'              && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review'        && contains(github.event.review.body,   '@claude')) ||
      (github.event_name == 'issues' && github.event.action == 'assigned' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --append-system-prompt "Read AGENTS.md before making any changes. Verify with: sbt compile. Run tests with: sbt jsonJVM/test ioJVM/test httpJVM/test. Follow all conventions in AGENTS.md."

  # ── Auto-triage new issues ────────────────────────────────────────────────
  claude-triage:
    name: Claude (issue triage)
    if: github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            A new issue was just opened. Please triage it:
            1. Read AGENTS.md — especially "Issue triage rules" and "Core philosophy".
            2. Apply the appropriate label(s): bug, enhancement, documentation, platform, good first issue, breaking.
            3. Post a brief comment: acknowledge the report, confirm whether it is in scope, and suggest next steps.
            4. If the feature request violates the "no FP jargon / no effect systems" rule or is out of scope,
               politely close it with an explanation referencing AGENTS.md.

  # ── Auto-review new PRs ───────────────────────────────────────────────────
  claude-review:
    name: Claude (PR review)
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            A new pull request was just opened. Please review it:
            1. Read AGENTS.md for project conventions.
            2. Check the diff for: correctness, Scaladoc on all public methods, tests for new behaviour,
               scalafmt compliance, and the "Simple things must be extremely simple" philosophy.
            3. Verify it compiles: sbt compile
            4. Post a review comment summarising findings. Do NOT approve or request-changes — comment only.

  # ── Weekly dependency / housekeeping ─────────────────────────────────────
  claude-maintenance:
    name: Claude (weekly maintenance)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Perform weekly maintenance on this Scala library:
            1. Read AGENTS.md for conventions.
            2. Check project/Versions.scala — look up the latest stable releases of:
               munit, sbt-scalajs, sbt-scala-native, and the Scala cross-compilation targets.
               Also check project/plugins.sbt for outdated plugin versions.
            3. If any dependency is outdated, create a single PR that bumps all of them,
               with title "chore: bump dependencies (weekly)".
               Verify the build still compiles: sbt compile
            4. If everything is up to date, do nothing.
