name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  # ── Format check ─────────────────────────────────────────────────────────────
  format:
    name: Scalafmt check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - uses: sbt/setup-sbt@v1
      - run: sbt scalafmtCheckAll scalafmtSbtCheck

  # ── JVM tests — matrix of Scala versions ─────────────────────────────────────
  test-jvm:
    name: Test JVM / Scala ${{ matrix.scala }}
    runs-on: ubuntu-latest
    needs: format
    strategy:
      fail-fast: false
      matrix:
        scala: ["2.13.17", "3.3.7", "3.5.2"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - uses: sbt/setup-sbt@v1
      - name: Run JVM tests
        run: sbt ++${{ matrix.scala }} jsonJVM/test ioJVM/test httpJVM/test

  # ── Scala.js tests ────────────────────────────────────────────────────────────
  test-js:
    name: Test Scala.js / Scala ${{ matrix.scala }}
    runs-on: ubuntu-latest
    needs: format
    strategy:
      fail-fast: false
      matrix:
        scala: ["2.13.17", "3.3.7"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - uses: sbt/setup-sbt@v1
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run Scala.js tests
        run: sbt ++${{ matrix.scala }} jsonJS/test

  # ── Scala Native compile check ────────────────────────────────────────────────
  test-native:
    name: Compile Scala Native / Scala ${{ matrix.scala }}
    runs-on: ubuntu-latest
    needs: format
    strategy:
      fail-fast: false
      matrix:
        scala: ["3.3.7"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - uses: sbt/setup-sbt@v1
      - name: Install Scala Native dependencies
        run: sudo apt-get update && sudo apt-get install -y clang libgc-dev libunwind-dev
      - name: Compile Native modules
        run: sbt ++${{ matrix.scala }} jsonNative/compile ioNative/compile httpNative/compile
      - name: Run Native tests
        run: sbt ++${{ matrix.scala }} jsonNative/test

  # ── Scaladoc generation ───────────────────────────────────────────────────────
  docs:
    name: Scaladoc
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - uses: sbt/setup-sbt@v1
      - run: sbt jsonJVM/doc ioJVM/doc httpJVM/doc

  # ── Publish dry-run ───────────────────────────────────────────────────────────
  publish-check:
    name: Publish dry-run
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [test-jvm, test-js]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - uses: sbt/setup-sbt@v1
      - run: sbt +publishLocal
