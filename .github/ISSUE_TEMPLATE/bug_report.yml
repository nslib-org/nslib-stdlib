name: Bug Report
description: Something is broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: input
    id: module
    attributes:
      label: Module
      description: Which nslib module is affected?
      placeholder: "e.g. stdlib-json, stdlib-io, stdlib-http"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: |
        The smallest code snippet that reproduces the issue.
      render: scala
      placeholder: |
        import nslib._
        JSON.parse("???")  // unexpected behaviour here
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour (error message / output)

  - type: input
    id: version
    attributes:
      label: nslib version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: scala
    attributes:
      label: Scala version
      placeholder: "3.3.7"
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform (JVM / Scala.js / Scala Native + OS)
      placeholder: "JVM on macOS 14"
