name: Documentation Improvement
description: Something in the docs is missing, wrong, or confusing
labels: ["documentation"]
body:
  - type: input
    id: location
    attributes:
      label: Where is the issue?
      placeholder: "e.g. README, docs/modules/json.md, scaladoc for JSON.parse"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What's wrong or missing?
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: Optional but appreciated.
